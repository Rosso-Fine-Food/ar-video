<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AR Video</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    * { margin: 0; padding: 0; }
    body { overflow: hidden; }
  </style>
</head>
<body>
<a-scene
  embedded
  arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
  vr-mode-ui="enabled: false"
  renderer="logarithmicDepthBuffer: true; precision: medium;">

  <a-assets>
    <video
      id="arVideo"
      src="test.mp4"
      preload="auto"
      loop
      muted
      playsinline
      webkit-playsinline
      crossorigin="anonymous">
    </video>
  </a-assets>

  <a-marker
    type="pattern"
    url="pattern-logo.patt"
    emitevents="true"
    smooth="true"
    smoothCount="10"
    smoothTolerance="0.01"
    smoothThreshold="5"
    id="marker">

    <a-video
      src="#arVideo"
      width="1.2"
      height="0.7"
      position="0 0.001 0"
      rotation="-90 0 0">
    </a-video>

  </a-marker>

  <a-entity camera></a-entity>
</a-scene>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    const marker = document.querySelector("#marker");
    const video = document.querySelector("#arVideo");

    // Sblocca il video al primo tocco/click (richiesto da browser mobile)
    document.body.addEventListener("click", () => {
      video.play().catch(() => {});
    }, { once: true });

    document.body.addEventListener("touchstart", () => {
      video.play().catch(() => {});
    }, { once: true });

    marker.addEventListener("markerFound", () => {
      console.log("✅ Marker trovato!");
      video.play().catch(e => console.warn("Play bloccato:", e));
    });

    marker.addEventListener("markerLost", () => {
      console.log("❌ Marker perso");
      video.pause();
    });
  });
</script>
</body>
</html>
